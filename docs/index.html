<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR Code Art — Preview</title>
  <style>
    body {
      background: #1a1a1a;
      color: #eee;
      font-family: monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
    }
    h1 { font-size: 1.2rem; letter-spacing: 0.2em; color: #aaa; }
    img {
      width: min(90vw, 500px);
      height: auto;
      border: 2px solid #444;
      margin: 1.5rem 0;
      image-rendering: pixelated;
    }
    p { font-size: 0.8rem; color: #666; }
  </style>
</head>
<body>
  <h1>QR CODE ART — PREVIEW</h1>
  <img src="art_qr.png" alt="Artistic QR Code">
  <p>Scan with your phone — contains vCard contact data</p>
</body>
</html>
