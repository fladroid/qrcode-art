<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR Code Art — Preview</title>
  <style>
    body {
      background: #000;
      color: #fff;
      font-family: monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 2rem;
      box-sizing: border-box;
    }
    h1 {
      font-size: 2.8rem;
      letter-spacing: 0.15em;
      color: #fff;
      text-align: center;
      margin-bottom: 1.5rem;
    }
    img {
      width: min(95vw, 700px);
      height: auto;
      border: 3px solid #fff;
      margin: 1rem 0;
      image-rendering: pixelated;
    }
    p {
      font-size: 1.6rem;
      color: #ccc;
      text-align: center;
      margin-top: 1.2rem;
    }
  </style>
</head>
<body>
  <h1>QR CODE ART — PREVIEW V1c</h1>
  <img src="art_qr.png" alt="Artistic QR Code">
  <p>Scan with your phone — contains vCard contact data</p>
</body>
</html>
