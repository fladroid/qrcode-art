<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QR Code Art Generator</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d0d0d;
      color: #f0f0f0;
      font-family: 'Courier New', monospace;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    h1 {
      font-size: 2rem;
      letter-spacing: 0.15em;
      text-align: center;
      margin-bottom: 0.4rem;
      color: #fff;
    }

    .subtitle {
      text-align: center;
      color: #ccc;
      font-size: 1rem;
      margin-bottom: 2.5rem;
      letter-spacing: 0.1em;
    }

    .container {
      max-width: 700px;
      margin: 0 auto;
    }

    .card {
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 8px;
      padding: 1.8rem;
      margin-bottom: 1.5rem;
    }

    .card h2 {
      font-size: 1.1rem;
      color: #fff;
      letter-spacing: 0.12em;
      margin-bottom: 1.2rem;
      border-bottom: 1px solid #333;
      padding-bottom: 0.6rem;
    }

    label {
      display: block;
      font-size: 0.85rem;
      color: #ccc;
      margin-bottom: 0.3rem;
      letter-spacing: 0.08em;
    }

    input[type="text"],
    input[type="email"],
    input[type="tel"] {
      width: 100%;
      background: #0d0d0d;
      border: 1px solid #444;
      border-radius: 4px;
      color: #fff;
      font-family: 'Courier New', monospace;
      font-size: 1rem;
      padding: 0.6rem 0.8rem;
      margin-bottom: 1rem;
      outline: none;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus,
    input[type="email"]:focus,
    input[type="tel"]:focus {
      border-color: #fff;
    }

    /* Portrait upload area */
    .upload-area {
      border: 2px dashed #444;
      border-radius: 6px;
      padding: 2rem;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      position: relative;
    }

    .upload-area:hover {
      border-color: #fff;
      background: #111;
    }

    .upload-area input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
      width: 100%;
      height: 100%;
    }

    .upload-area p {
      font-size: 1rem;
      color: #bbb;
      pointer-events: none;
    }

    .upload-area p span {
      color: #fff;
      font-weight: bold;
    }

    #preview-portrait {
      display: none;
      width: 120px;
      height: 120px;
      object-fit: cover;
      border: 2px solid #555;
      border-radius: 4px;
      margin: 0.8rem auto 0;
      image-rendering: pixelated;
    }

    /* Threshold slider */
    .slider-row {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-top: 0.8rem;
    }

    input[type="range"] {
      flex: 1;
      accent-color: #fff;
    }

    #threshold-val {
      color: #fff;
      font-size: 1rem;
      min-width: 2.5rem;
      text-align: right;
    }

    /* Generate button */
    #btn-generate {
      width: 100%;
      background: #fff;
      color: #000;
      border: none;
      border-radius: 4px;
      font-family: 'Courier New', monospace;
      font-size: 1.2rem;
      font-weight: bold;
      letter-spacing: 0.15em;
      padding: 0.9rem;
      cursor: pointer;
      transition: background 0.2s;
      margin-top: 0.5rem;
    }

    #btn-generate:hover { background: #ddd; }
    #btn-generate:disabled { background: #444; color: #ccc; cursor: not-allowed; }

    /* Output */
    #output-section { display: none; }

    #output-section canvas {
      display: block;
      width: 100%;
      max-width: 500px;
      height: auto;
      margin: 0 auto;
      border: 2px solid #fff;
      image-rendering: pixelated;
    }

    #btn-download {
      display: block;
      width: 100%;
      background: #0d0d0d;
      color: #fff;
      border: 1px solid #fff;
      border-radius: 4px;
      font-family: 'Courier New', monospace;
      font-size: 1rem;
      letter-spacing: 0.12em;
      padding: 0.8rem;
      cursor: pointer;
      margin-top: 1rem;
      transition: background 0.2s;
    }

    #btn-download:hover { background: #1a1a1a; }

    #status-msg {
      text-align: center;
      font-size: 0.95rem;
      color: #ccc;
      margin-top: 0.8rem;
      min-height: 1.4rem;
    }

    .footer {
      text-align: center;
      color: #999;
      font-size: 0.8rem;
      margin-top: 2rem;
      letter-spacing: 0.08em;
    }
  </style>
</head>
<body>
<div class="container">

  <h1>QR CODE ART</h1>
  <p class="subtitle">GENERATOR — V2c</p>

  <!-- Contact data form -->
  <div class="card">
    <h2>01 / CONTACT DATA</h2>

    <label>Full Name</label>
    <input type="text" id="f-name" placeholder="Jane Doe">

    <label>Phone</label>
    <input type="tel" id="f-phone" placeholder="+1 555 000 1234">

    <label>Email</label>
    <input type="email" id="f-email" placeholder="jane@example.com">

    <!-- Address field hidden: using name + phone + email only (version 40 QR) -->
  </div>

  <!-- Portrait upload -->
  <div class="card">
    <h2>02 / PORTRAIT PHOTO</h2>

    <div class="upload-area">
      <input type="file" id="portrait-file" accept="image/*">
      <p>Click or drag &amp; drop your photo<br><span>JPG / PNG / WEBP</span></p>
    </div>
    <img id="preview-portrait" alt="Portrait preview">

    <div class="slider-row">
      <label style="margin:0; min-width:120px;">B&amp;W Threshold</label>
      <input type="range" id="threshold" min="50" max="220" value="160">
      <span id="threshold-val">160</span>
    </div>
  </div>

  <!-- Generate -->
  <div class="card">
    <h2>03 / GENERATE</h2>
    <button id="btn-generate">GENERATE QR CODE</button>
    <p id="status-msg">Fill in your data and upload a photo to begin.</p>
  </div>

  <!-- Output -->
  <div class="card" id="output-section">
    <h2>04 / RESULT</h2>
    <canvas id="qr-canvas"></canvas>
    <button id="btn-download">⬇ DOWNLOAD PNG</button>
  </div>

  <p class="footer">All processing is done locally in your browser. Nothing is uploaded to any server.</p>

</div>

<!-- QR code library (pure JS, no dependencies) -->
<script src="https://unpkg.com/qrcode-generator@1.4.4/qrcode.js"></script>
<script>
// ============================================================
// Portrait preview + threshold live update
// ============================================================
const portraitFile  = document.getElementById('portrait-file');
const previewImg    = document.getElementById('preview-portrait');
const threshSlider  = document.getElementById('threshold');
const threshVal     = document.getElementById('threshold-val');

let portraitDataURL = null;  // stores loaded image as data URL

portraitFile.addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = (ev) => {
    portraitDataURL = ev.target.result;
    previewImg.src = portraitDataURL;
    previewImg.style.display = 'block';
    updateUploadLabel(file.name);
  };
  reader.readAsDataURL(file);
});

threshSlider.addEventListener('input', () => {
  threshVal.textContent = threshSlider.value;
});

function updateUploadLabel(name) {
  const p = document.querySelector('.upload-area p');
  p.innerHTML = `Loaded: <span>${name}</span>`;
}

// ============================================================
// Build vCard string from form fields
// ============================================================
function buildVCard() {
  const name  = document.getElementById('f-name').value.trim()  || 'Unknown';
  const phone = document.getElementById('f-phone').value.trim() || '';
  const email = document.getElementById('f-email').value.trim() || '';

  // Build minimal vCard (name + phone + email only)
  const lines = [
    'BEGIN:VCARD',
    'VERSION:3.0',
    `FN:${name}`,
    phone ? `TEL:${phone}` : '',
    email ? `EMAIL:${email}` : '',
    'END:VCARD'
  ].filter(Boolean).join('\n');

  // Pad with whitespace comments to force QR version 40 (177x177 matrix)
  // Version 40-H supports up to 1273 bytes — more pixels = better portrait quality
  // NOTE: trailing whitespace in vCard is ignored by all major contact readers
  const TARGET_LENGTH = 1200;
  const padding = ' '.repeat(Math.max(0, TARGET_LENGTH - lines.length));
  return lines + padding;
}

// ============================================================
// Convert portrait image to strict B&W pixel array
// sized to match the QR matrix dimensions
// ============================================================
function preparePortrait(matrixSize, threshold) {
  return new Promise((resolve) => {
    const img = new Image();
    img.onload = () => {
      // Draw portrait at exact QR matrix size using bicubic-quality smoothing
      const c = document.createElement('canvas');
      c.width  = matrixSize;
      c.height = matrixSize;
      const ctx = c.getContext('2d');
      ctx.imageSmoothingEnabled = true;
      ctx.imageSmoothingQuality = 'high';
      ctx.drawImage(img, 0, 0, matrixSize, matrixSize);

      // Read pixel data and convert to B&W using Floyd-Steinberg dithering
      // Dithering preserves facial features much better than hard threshold
      const imgData = ctx.getImageData(0, 0, matrixSize, matrixSize);
      const pixels = imgData.data;

      // Build grayscale float array
      const gray = new Float32Array(matrixSize * matrixSize);
      for (let i = 0; i < matrixSize * matrixSize; i++) {
        gray[i] = 0.299 * pixels[i*4] + 0.587 * pixels[i*4+1] + 0.114 * pixels[i*4+2];
      }

      // Floyd-Steinberg dithering — applied only in center portrait zone
      // Outside center zone: plain threshold (no error diffusion bleeds into QR data)
      const CENTER_ZONE = 0.45;  // must match blend zone in render loop
      const bw = new Array(matrixSize * matrixSize).fill(false);
      const cx = matrixSize / 2, cy = matrixSize / 2;

      for (let y = 0; y < matrixSize; y++) {
        for (let x = 0; x < matrixSize; x++) {
          const idx = y * matrixSize + x;
          const oldVal = gray[idx];
          const newVal = oldVal < threshold ? 0 : 255;
          bw[idx] = newVal === 0;

          // Only diffuse error within center zone — protect outer QR data modules
          const ddx = Math.abs(x - cx) / (matrixSize / 2);
          const ddy = Math.abs(y - cy) / (matrixSize / 2);
          const inCenter = Math.max(ddx, ddy) < CENTER_ZONE;

          if (inCenter) {
            const err = oldVal - newVal;
            if (x + 1 < matrixSize)                          gray[idx + 1]              += err * 7 / 16;
            if (y + 1 < matrixSize && x > 0)                 gray[idx + matrixSize - 1] += err * 3 / 16;
            if (y + 1 < matrixSize)                          gray[idx + matrixSize]     += err * 5 / 16;
            if (y + 1 < matrixSize && x + 1 < matrixSize)    gray[idx + matrixSize + 1] += err * 1 / 16;
          }
        }
      }
      resolve(bw);
    };
    img.src = portraitDataURL;
  });
}

// ============================================================
// Detect structural QR zones that must never be modified:
// finder patterns, separators, timing patterns
// ============================================================
function isProtected(x, y, size) {
  if (x < 9 && y < 9)               return true;  // top-left finder
  if (x > size - 10 && y < 9)       return true;  // top-right finder
  if (x < 9 && y > size - 10)       return true;  // bottom-left finder
  if (x === 6 || y === 6)            return true;  // timing patterns
  return false;
}

// ============================================================
// Generate QR matrix using qrcode-generator library
// Returns 2D boolean matrix (true = dark module)
// ============================================================
function getQRMatrix(data) {
  return new Promise((resolve) => {
    // qrcode-generator gives direct matrix access — no DOM tricks needed
    const qr = qrcode(0, 'H');  // type=0 (auto), level=H (30% tolerance)
    qr.addData(data);
    qr.make();

    const size = qr.getModuleCount();
    const matrix = [];
    for (let y = 0; y < size; y++) {
      const row = [];
      for (let x = 0; x < size; x++) {
        row.push(qr.isDark(y, x));  // true = dark module
      }
      matrix.push(row);
    }
    resolve(matrix);
  });
}

// ============================================================
// Main: blend portrait + QR and render to canvas
// ============================================================
document.getElementById('btn-generate').addEventListener('click', async () => {
  const btn = document.getElementById('btn-generate');
  const status = document.getElementById('status-msg');

  btn.disabled = true;
  status.textContent = 'Building vCard...';

  const vcard = buildVCard();
  const threshold = parseInt(threshSlider.value);

  status.textContent = 'Generating QR matrix...';
  const matrix = await getQRMatrix(vcard);
  const size = matrix.length;

  // Prepare portrait (or generate placeholder if none uploaded)
  let bwPixels;
  if (portraitDataURL) {
    status.textContent = 'Processing portrait...';
    bwPixels = await preparePortrait(size, threshold);
  } else {
    status.textContent = 'No portrait — using placeholder silhouette...';
    // Simple oval head silhouette as placeholder
    bwPixels = new Array(size * size).fill(false);
    const phCx = size / 2, phCy = size / 2;
    const phRx = size * 0.28, phRy = size * 0.38;
    for (let py = 0; py < size; py++) {
      for (let px2 = 0; px2 < size; px2++) {
        const ddx = (px2 - phCx) / phRx;
        const ddy = (py  - phCy) / phRy;
        bwPixels[py * size + px2] = (ddx*ddx + ddy*ddy) <= 1.0;
      }
    }
  }

  status.textContent = 'Rendering portrait overlay...';

  // BOX_SIZE: how many canvas pixels per QR module
  const BOX = 10;
  const canvas = document.getElementById('qr-canvas');
  canvas.width  = size * BOX;
  canvas.height = size * BOX;
  const ctx = canvas.getContext('2d');

  // === POSTER / SILHOUETTE BLEND TECHNIQUE ===
  // Best for: buildings, skylines, landmarks, landscapes
  //
  // How it works:
  //   1. Draw clean QR (black modules on white)
  //   2. Apply silhouette via CSS 'multiply' blend mode
  //      - multiply(white, grey) = grey  → silhouette tints white modules
  //      - multiply(black, anything) = black → QR modules stay solid black
  //   3. Result: silhouette visible through QR, scanner reads black modules

  // --- Prepare offscreen QR layer (clean black/white) ---
  const qrOffscreen = document.createElement('canvas');
  qrOffscreen.width  = canvas.width;
  qrOffscreen.height = canvas.height;
  const qrCtx = qrOffscreen.getContext('2d');
  qrCtx.fillStyle = '#ffffff';
  qrCtx.fillRect(0, 0, canvas.width, canvas.height);
  for (let y = 0; y < size; y++) {
    for (let x = 0; x < size; x++) {
      if (matrix[y][x]) {
        qrCtx.fillStyle = '#000000';
        qrCtx.fillRect(x * BOX, y * BOX, BOX, BOX);
      }
    }
  }

  if (portraitDataURL) {
    // --- Prepare silhouette layer ---
    // Silhouette image: dark subject on light background works best
    // We map: dark pixels → light grey (visible through QR white modules)
    //         light pixels → dark grey (tints background)
    // This creates an "inverted" effect where the subject appears lighter than background
    const silOffscreen = document.createElement('canvas');
    silOffscreen.width  = canvas.width;
    silOffscreen.height = canvas.height;
    const silCtx = silOffscreen.getContext('2d');

    const silImg = new Image();
    await new Promise(res => { silImg.onload = res; silImg.src = portraitDataURL; });

    // Draw image with grayscale + invert filter
    // invert() swaps dark/light so building (dark) becomes light — shows through white QR modules
    silCtx.filter = `grayscale(100%) invert(100%) contrast(1.4) brightness(${threshold/128})`;
    silCtx.drawImage(silImg, 0, 0, canvas.width, canvas.height);

    // Apply multiply blend: draws silhouette onto QR layer
    // multiply keeps black modules black, tints white modules with silhouette
    qrCtx.globalCompositeOperation = 'multiply';
    qrCtx.globalAlpha = 0.85;
    qrCtx.drawImage(silOffscreen, 0, 0);
    qrCtx.globalAlpha = 1.0;
    qrCtx.globalCompositeOperation = 'source-over';
  }

  // Draw final result to main canvas
  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
  ctx.drawImage(qrOffscreen, 0, 0);

  // --- CRITICAL: Redraw structural zones as pure B&W LAST ---
  // Must be the very last drawing operation — nothing drawn after this
  // Covers: finder patterns, separators, timing patterns, format info strips
  const protectedZones = [
    [0,      0,      9,    9   ],  // top-left finder + separator
    [size-9, 0,      9,    9   ],  // top-right finder + separator
    [0,      size-9, 9,    9   ],  // bottom-left finder + separator
    [0,      6,      size, 1   ],  // horizontal timing pattern
    [6,      0,      1,    size],  // vertical timing pattern
    [size-9, 8,      9,    1   ],  // top-right format info
    [8,      size-9, 1,    9   ],  // bottom-left format info
    [8,      0,      1,    9   ],  // top-left format info vertical
    [0,      8,      9,    1   ],  // top-left format info horizontal
  ];
  for (const [px, py, pw, ph] of protectedZones) {
    for (let gy = py; gy < Math.min(py + ph, size); gy++) {
      for (let gx = px; gx < Math.min(px + pw, size); gx++) {
        ctx.fillStyle = matrix[gy][gx] ? '#000000' : '#ffffff';
        ctx.fillRect(gx * BOX, gy * BOX, BOX, BOX);
      }
    }
  }

  // Show output section
  document.getElementById('output-section').style.display = 'block';
  document.getElementById('output-section').scrollIntoView({ behavior: 'smooth' });

  status.textContent = `Done! Matrix: ${size}×${size} modules. Scan to verify.`;
  btn.disabled = false;
});

// ============================================================
// Download generated QR as PNG
// ============================================================
document.getElementById('btn-download').addEventListener('click', () => {
  const canvas = document.getElementById('qr-canvas');
  const link = document.createElement('a');
  link.download = 'art_qr.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
});
</script>
</body>
</html>
